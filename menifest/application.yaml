apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: my-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/DipanshuBisen/https://github.com/DipanshuBisen/ArgoCD-EKS.git
    targetRevision: HEAD
    path: manifest

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true